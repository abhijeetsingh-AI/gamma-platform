services:
  # ── Main FastAPI Web Service ──────────────────────────────────────
  - type: web
    name: gamma-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_WEBHOOK_URL
        sync: false
      - key: TTS_PROVIDER
        value: twilio
      - key: SECRET_KEY
        generateValue: true
      - key: BASE_URL
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./gamma.db
      - key: UPLOAD_DIR
        value: ./uploads
      - key: REDIS_URL
        fromService:
          name: gamma-redis
          type: redis
          property: connectionString

  # ── Celery Worker ─────────────────────────────────────────────────
  - type: worker
    name: gamma-celery
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.celery_app worker --loglevel=info --concurrency=4
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: BASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: TTS_PROVIDER
        value: twilio
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./gamma.db
      - key: REDIS_URL
        fromService:
          name: gamma-redis
          type: redis
          property: connectionString

  # ── Redis ─────────────────────────────────────────────────────────
  - type: redis
    name: gamma-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
